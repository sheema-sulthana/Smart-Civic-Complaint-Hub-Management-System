<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Analytics</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/analytics.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="analytics-container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo-section">

            <h1 style="font-size:x-large;">Complaint Hub</h1>

            <p class="admin-text">ADMIN DASHBOARD</p>

        </div>

        <ul>

            <li>
                <a href="/admin-dashboard">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="/admin/complaints">
                    Complaints
                </a>
            </li>

            <li>
                <a href="/admin/analytics" class="active">
                    Analytics
                </a>
            </li>

            <li>
                <a href="/admin/feedbacks">
                    Feedbacks
                </a>
            </li>

            <li>
                <a href="/admin/logout">
                    Logout
                </a>
            </li>

        </ul>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main-content">

        <h1 class="page-title">
            Complaint Analytics
        </h1>

        <p class="page-subtitle">
            Analyze complaint status and category reports
        </p>

        <!-- TOP ANALYTICS -->

        <div class="analytics-grid">

            <!-- STATUS CHART -->

            <div class="chart-card">

                <h2>Complaint Status</h2>

                <div class="chart-box">

                    <canvas id="statusChart"></canvas>

                </div>

            </div>

            <!-- CATEGORY CHART -->

            <div class="chart-card">

                <h2>Category Distribution</h2>

                <div class="chart-box">

                    <canvas id="categoryChart"></canvas>

                </div>

            </div>

        </div>

        <!-- TREND CHART -->

        
               <div class="chart-card">

    <h2>Weekly Complaint Trend</h2>

    <div class="chart-box">

        <canvas id="trendChart"></canvas>

    </div>

</div>

<!-- STATUS CHART -->

<script>

const statusCtx = document.getElementById('statusChart');

new Chart(statusCtx, {

    type: 'doughnut',

    data: {

        labels: [

            'Pending',

            'In Progress',

            'Resolved'

        ],

        datasets: [{

            data: [

                {{ pending }},

                {{ progress }},

                {{ resolved }}

            ],

            backgroundColor: [

                '#f59e0b',

                '#2196f3',

                '#4caf50'

            ],

            borderWidth: 0

        }]

    },

    options: {

        responsive: true,

        maintainAspectRatio: false

    }

});

</script>

<!-- CATEGORY CHART -->

<script>

const categoryCtx = document.getElementById('categoryChart');

new Chart(categoryCtx, {

    type: 'bar',

    data: {

        labels: {{ category_labels | tojson }},

        datasets: [{

            label: 'Complaints',

            data: {{ category_counts | tojson }},

            backgroundColor: [

                '#14b8a6',

                '#2196f3',

                '#f59e0b',

                '#4caf50',

                '#ef4444',

                '#8b5cf6'

            ],

            borderRadius: 10

        }]

    },

    options: {

        responsive: true,

        maintainAspectRatio: false,

        plugins: {

            legend: {

                display: false

            }

        },

        scales: {

            y: {

                beginAtZero: true

            }

        }

    }

});

</script>

<!-- TREND CHART -->
<script>

const trendCtx = document.getElementById('trendChart');

new Chart(trendCtx, {

    type: 'line',

    data: {

        labels: [

            'Mon',

            'Tue',

            'Wed',

            'Thu',

            'Fri',

            'Sat',

            'Sun'

        ],

        datasets: [{

            label: 'Weekly Complaints',

            data: {{ weekly_counts | tojson }},

            borderColor: '#14b8a6',

            backgroundColor: 'rgba(20,184,166,0.1)',

            fill: true,

            tension: 0.4,

            pointBackgroundColor: '#14b8a6',

            pointRadius: 5

        }]

    },

    options: {

        responsive: true,

        maintainAspectRatio: false,

        scales: {

            y: {

                beginAtZero: true

            }

        }

    }

});

</script>

</body>

</html>
